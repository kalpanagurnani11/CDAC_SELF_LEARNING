<html>
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<a id="l" href="https://google.com">Google</a>

<br><br>

<button id="b">Change Lnk</button>

<script>

$(document).ready(function(){

$("#b").click(function(){

$("#l").attr("href","https://www.linkedin.com/");
$("#l").text("LinkedIn");

});

});

</script>

</body>
</html>
