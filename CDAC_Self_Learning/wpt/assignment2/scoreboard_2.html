// Design and implement a web page that displays a live scoreboard. Use AJAX
// (XMLHttpRequest) to retrieve and interpret JSON data from a URL provided by the faculty.
<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
</head>
<body>

<h2>Live Scoreboard</h2>
<button onclick="loadData()">Load Score</button>

<div id="result"></div>

<script>
function loadData() {
    let xhr = new XMLHttpRequest();

    xhr.open("GET", "score.json", true);

    xhr.onload = function() {
        let data = JSON.parse(this.responseText);

        document.getElementById("result").innerHTML =
            "Match: " + data.match + "<br>" +
            "India: " + data.score.India + "<br>" +
            "Australia: " + data.score.Australia + "<br>" +
            "Status: " + data.status;
    };

    xhr.send();
}
</script>

</body>
</html>
