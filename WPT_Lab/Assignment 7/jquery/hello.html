<!DOCTYPE html>
<html>
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function()
    {
        $("#ok").click(function()
    {
        $("#p1").css({"text-decoration":"underline"});
        $("#p2").css({"font-weight":"bold"});
         $("#p3").css({"font-style": "italic"});

    })

    }
)
</script>
</head>

<body>

<button id="ok">OK</button>

<p id="p1">hello</p>
<p id="p2">hello</p>
<p id="p3">hello</p>
</body>
</html>
